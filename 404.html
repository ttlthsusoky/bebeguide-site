<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#2f6f61">
  <title>페이지를 찾을 수 없어요 | 베베가이드</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #17312b;
      --muted: #526a64;
      --brand: #2f6f61;
      --brand-dark: #205247;
      --surface: #ffffff;
      --soft: #edf7f3;
      --line: #cfe3dc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(145deg, #f7fbf9 0%, #edf7f3 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(100%, 680px);
      padding: clamp(28px, 6vw, 52px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: 0 18px 50px rgba(32, 82, 71, 0.10);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--brand);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1.18;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.06rem;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border: 2px solid var(--brand);
      border-radius: 14px;
      color: var(--brand-dark);
      font-weight: 800;
      text-align: center;
      text-decoration: none;
    }

    .button.primary {
      background: var(--brand);
      color: #ffffff;
    }

    .button:hover { transform: translateY(-1px); }
    .button:focus-visible { outline: 3px solid #f3b843; outline-offset: 3px; }

    .boundary {
      margin: 24px 0 0;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--soft);
      color: var(--brand-dark);
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      body { padding: 16px; }
      main { border-radius: 22px; }
      .actions { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .button:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main aria-labelledby="not-found-title">
    <p class="eyebrow">404 · 길을 잃었어요</p>
    <h1 id="not-found-title">찾으시는 페이지가 없어요</h1>
    <p class="lead">주소가 바뀌었거나 아직 공개하지 않은 자료일 수 있습니다. 필요한 기준은 홈의 빠른 찾기나 월령별 체크리스트에서 다시 찾아보세요.</p>
    <div class="actions" aria-label="다시 찾기">
      <a class="button primary" href="/">베베가이드 홈</a>
      <a class="button" href="/#quick-find">상황별 빠른 찾기</a>
      <a class="button" href="/#age">월령별 체크리스트</a>
      <a class="button" href="/market/">제품 선택 기준</a>
    </div>
    <p class="boundary"><strong>공개 경계:</strong> 내부 운영자료, 개인정보가 포함될 수 있는 기록, 검수 중인 파일은 사이트에 공개하지 않습니다.</p>
  </main>
</body>
</html>
