<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You | 베베가이드</title>
  <meta name="description" content="Check your email for the download link." />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #ff8e8e;
      --primary-dark: #ff7676;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      text-align: center;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      font-weight: 700;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Check your email </h1>

    <p>
      Your baby routine planner is on its way.<br><br>
      Please check your inbox and click the confirmation link.<br>
      If you don’t see it within 60 seconds, check Spam or Promotions.
    </p>

    <a class="btn" href="/">
      Back to Be-Be Guide
    </a>

    <br><br>

    <a class="btn" href="/baby-routine-planner.html">
    Return to Planner Page
    </a>

    <p style="margin-top:14px; font-size:0.9rem;">
      You’ll receive your planner immediately after confirmation.
    </p>

  </main>
</body>
</html>
